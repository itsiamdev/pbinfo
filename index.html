<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezolvări PBInfo - Căutare Probleme</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4aa;
            --primary-dark: #00b894;
            --secondary: #6c5ce7;
            --accent: #00cec9;
            --bg-dark: #0a0a0f;
            --bg-card: #13131f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 170, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 206, 201, 0.1) 0%, transparent 60%);
            filter: blur(60px);
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            text-align: center;
            padding: 60px 0 40px;
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        header .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid rgba(0, 212, 170, 0.3);
            color: var(--primary);
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 20px;
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease-out;
        }

        header h1 {
            font-size: 3em;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1em;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .search-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(0, 212, 170, 0.05),
                transparent 30%
            );
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .search-section > * {
            position: relative;
            z-index: 1;
        }

        .search-section label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 18px;
            color: var(--text-primary);
        }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .search-box input {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.4);
            color: var(--text-primary);
            font-size: 1.05em;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 212, 170, 0.1), 0 8px 30px rgba(0, 212, 170, 0.15);
            background: rgba(0, 0, 0, 0.5);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .search-btn {
            padding: 18px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--bg-dark);
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 212, 170, 0.3);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            flex: 1;
            min-width: 140px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .stat-item:nth-child(2) { animation-delay: 0.45s; }
        .stat-item:nth-child(3) { animation-delay: 0.5s; }

        .stat-item:hover {
            border-color: rgba(0, 212, 170, 0.3);
            transform: translateY(-2px);
        }

        .stat-item .stat-num {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-item .stat-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        .problems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .problem-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeInUp 0.5s ease-out both;
            position: relative;
        }

        .problem-card:nth-child(n) { animation-delay: calc(0.05s * var(--i)); }

        .problem-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .problem-card:hover::before {
            opacity: 1;
        }

        .problem-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(0, 212, 170, 0.25);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 8px 30px rgba(0, 212, 170, 0.1);
        }

        .problem-card.open {
            border-color: rgba(0, 212, 170, 0.4);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6), 0 10px 40px rgba(0, 212, 170, 0.15);
        }

        .problem-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 24px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            user-select: none;
            transition: background 0.3s ease;
        }

        .problem-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .problem-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .problem-number {
            font-size: 1.4em;
            font-weight: 800;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
        }

        .problem-title {
            font-size: 1em;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .toggle-icon {
            color: var(--text-secondary);
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .problem-card:hover .toggle-icon {
            color: var(--primary);
        }

        .problem-card.open .toggle-icon {
            transform: rotate(180deg);
            color: var(--primary);
        }

        .problem-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: rgba(0, 0, 0, 0.4);
        }

        .problem-card.open .problem-body {
            max-height: 800px;
        }

        .code-wrapper {
            position: relative;
            padding: 20px 24px 24px;
        }

        .code-wrapper pre {
            margin: 0;
            padding: 20px;
            background: #0d0d12;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            line-height: 1.7;
            color: #e0e0e0;
            white-space: pre;
            position: relative;
        }

        .code-filename {
            display: block;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            padding: 8px 16px;
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid rgba(0, 212, 170, 0.3);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            z-index: 2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn:hover {
            background: rgba(0, 212, 170, 0.25);
            border-color: rgba(0, 212, 170, 0.5);
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: rgba(46, 213, 115, 0.2);
            border-color: rgba(46, 213, 115, 0.5);
            color: #2ed573;
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
            animation: fadeInUp 0.4s ease-out;
        }

        .no-results span {
            font-size: 4em;
            display: block;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        footer {
            text-align: center;
            padding: 40px 0 20px;
            color: var(--text-secondary);
            font-size: 0.9em;
            border-top: 1px solid var(--border);
            margin-top: 60px;
            animation: fadeInUp 0.6s ease-out 0.5s both;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2em;
            }

            .search-box {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
            }

            .problems-grid {
                grid-template-columns: 1fr;
            }

            .stat-item {
                min-width: 100%;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 170, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 170, 0.5);
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <header>
            <span class="badge">Code Solutions</span>
            <h1>Rezolvări PBInfo</h1>
            <p>Caută problemele după număr sau titlu • Clasa a 9-a • Operatori și expresii</p>
        </header>

        <div class="search-section">
            <label>
                <span>🔍</span> Caută problemă
            </label>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ex: 3180, operații, suma..." autofocus>
                <button class="search-btn" onclick="clearSearch()">Golește</button>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-num" id="totalProblems">14</div>
                    <div class="stat-label">Probleme totale</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="visibleProblems">14</div>
                    <div class="stat-label">Rezultate afișate</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num">9-a</div>
                    <div class="stat-label">Clasa</div>
                </div>
            </div>
        </div>

        <div class="problems-grid" id="problemsGrid"></div>

        <footer>
            <p>Rezolvări PBInfo &mdash; Clasa a 9-a • Elemente de bază ale limbajului • Operatori și expresii</p>
            <p style="margin-top: 10px; opacity: 0.6;">Cu ❤️ pentru programatori</p>
        </footer>
    </div>

    <script>
        const problems = [
            {
                number: "813",
                title: "Perimetrul dreptunghiului",
                filename: "813.cpp",
                code: `#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int a;\n    cin >> a;\n    cout << a + 2 * a + 2 * a - 3;\n    return 0;\n}`
            },
            {
                number: "814",
                title: "Aria dreptunghiului",
                filename: "814.cpp",
                code: `#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int x, y;\n    cin >> x >> y;\n    cout << 3 * y - x;\n    return 0;\n}`
            },
            {
                number: "939",
                title: "La mulți ani!",
                filename: "939.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int a, b;\n    cin >> a >> b;\n    cout << a + b;\n    return 0;\n}`
            },
            {
                number: "941",
                title: "La mulți ani!",
                filename: "941.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    cout << "La multi ani!";\n    return 0;\n}`
            },
            {
                number: "1258",
                title: "Scăderea a două numere",
                filename: "1258.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int a, b;\n    cin >> a >> b;\n    cout << a - b;\n    return 0;\n}`
            },
            {
                number: "1260",
                title: "Operații pe a și b",
                filename: "1260.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int a, b;\n    cin >> a >> b;\n    cout << a + b << " " << a - b << " " << a * b << " " << a / b;\n    return 0;\n}`
            },
            {
                number: "1273",
                title: "Ultima cifră a sumei",
                filename: "1273.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int a, b, s = 0;\n    cin >> a >> b;\n    s = a + b;\n    int n = s % 10;\n    cout << n;\n    return 0;\n}`
            },
            {
                number: "2240",
                title: "C, P, G, T",
                filename: "2240.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main(){\n    int C, P, G, T;\n    cin >> C;\n    P = 2 * C;\n    G = 2 * P;\n    T = C + P + G;\n    cout << T;\n    return 0;\n}`
            },
            {
                number: "2263",
                title: "Timp total de lucru",
                filename: "2263.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main(){\n    int t1, t2, n, m, z;\n    cin >> t1 >> t2 >> n >> m >> z;\n    int a = t1 * n + t2 * m;\n    int t = a * z;\n    cout << t;\n    return 0;\n}`
            },
            {
                number: "3178",
                title: "Expresie cu f, b, n",
                filename: "3178.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int f, b, n;\n    cin >> f >> b >> n;\n    n = 3 * f * n + 2 * b * n;\n    cout << n;\n    return 0;\n}`
            },
            {
                number: "3179",
                title: "Puterea a 5-a",
                filename: "3179.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int n;\n    cin >> n;\n    n = n * n * n * n * n;\n    cout << n;\n    return 0;\n}`
            },
            {
                number: "3180",
                title: "Expresie liniară",
                filename: "3180.cpp",
                code: `#include <iostream>\n\nusing namespace std;\n\nint main()\n{\n    int a, b, c, n, m, p;\n    cin >> a >> b >> c; cin >> n >> m >> p;\n    cout << a * n + b * m + c * p;\n    return 0;\n}`
            },
            {
                number: "3210",
                title: "Număr cutii și rest",
                filename: "3210.cpp",
                code: `#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int B, S;\n    cin >> B >> S;\n    int numCutii = 0, rest = 0;\n    while (S >= B) {\n        numCutii++;\n        S -= B;\n    }\n    rest = B - S;\n    cout << numCutii << " " << rest;\n    return 0;\n}`
            },
            {
                number: "3978",
                title: "Sume de intervale",
                filename: "3978.cpp",
                code: `#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int s, a, b, c;\n    cin >> a >> b >> c;\n    s = b * (b + 1) / 2 - a * (a - 1) / 2;\n    cout << s << " ";\n    s = c * (c + 1) / 2 - b * (b - 1) / 2;\n    cout << s << " ";\n    s = c * (c + 1) / 2 - a * (a - 1) / 2;\n    cout << s << " ";\n    return 0;\n}`
            }
        ];

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderProblems(list) {
            const grid = document.getElementById('problemsGrid');
            if (list.length === 0) {
                grid.innerHTML = `<div class="no-results"><span>🔍</span><strong>Nici o problemă găsită</strong><br>Încearcă alt număr sau cuvânt cheie</div>`;
                document.getElementById('visibleProblems').textContent = '0';
                return;
            }

            document.getElementById('visibleProblems').textContent = list.length;

            grid.innerHTML = list.map((p, idx) => {
                const escapedCode = escapeHtml(p.code);
                return `
                    <div class="problem-card" style="--i: ${idx}" onclick="this.classList.toggle('open')">
                        <div class="problem-header">
                            <div class="problem-left">
                                <span class="problem-number">#${p.number}</span>
                                <span class="problem-title">${p.title}</span>
                            </div>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div class="problem-body">
                            <div class="code-wrapper">
                                <span class="code-filename">${p.filename}</span>
                                <button class="copy-btn" onclick="event.stopPropagation(); copyCode(this, \`${p.number}\`)">📋 Copiază</button>
                                <pre><code>${escapedCode}</code></pre>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyCode(btn, number) {
            const problem = problems.find(p => p.number === number);
            if (!problem) return;

            navigator.clipboard.writeText(problem.code).then(() => {
                btn.textContent = '✓ Copiat!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copiază';
                    btn.classList.remove('copied');
                }, 1800);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = problem.code;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '✓ Copiat!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copiază';
                    btn.classList.remove('copied');
                }, 1800);
            });
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            renderProblems(problems);
        }

        document.getElementById('searchInput').addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();
            if (!query) {
                renderProblems(problems);
                return;
            }

            const filtered = problems.filter(p =>
                p.number.includes(query) ||
                p.title.toLowerCase().includes(query) ||
                p.filename.toLowerCase().includes(query)
            );

            renderProblems(filtered);
        });

        // Render all on load
        renderProblems(problems);
    </script>
</body>
</html>
